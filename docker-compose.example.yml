services:
  stock-ta:
    build: .
    # or, pull the image built by CI:
    # image: ghcr.io/felix920506/stock-ta:latest
    container_name: stock-ta
    restart: unless-stopped
    network_mode: bridge
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - stock-ta-cache:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0) if urllib.request.urlopen('http://127.0.0.1:8000/health',timeout=3).status==200 else sys.exit(1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  stock-ta-cache:
